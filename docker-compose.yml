version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# MAF — Local Development Stack
#
# Services:
#   postgres  → PostgreSQL 16 (log storage + job state)
#   backend   → FastAPI (port 8000)
#   frontend  → Next.js dev server (port 3000)
#
# Usage:
#   docker-compose up -d postgres   # Start only DB first
#   alembic upgrade head             # Run migrations
#   docker-compose up                # Start everything
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: maf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: maf_logs
      POSTGRES_USER: maf_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-maf_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maf_user -d maf_logs"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maf_backend
    restart: unless-stopped
    env_file: .env
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app           # Hot reload in dev
      - /tmp:/tmp                # CSV.GZ staging area
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      uvicorn app.main:app
        --host 0.0.0.0
        --port 8000
        --reload
        --log-level info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: maf_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules        # Keep container node_modules
      - /app/.next               # Keep Next.js build cache
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: maf_network
